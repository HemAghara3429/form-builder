<div class="form-group">
  <label *ngIf="label" [for]="id" class="form-label" [id]="id + '-label'">
    <app-icon *ngIf="iconName" [name]="iconName" [size]="iconSize"></app-icon>
    {{ label }}
    <span *ngIf="required" class="required">*</span>
  </label>
  <select
    [id]="id"
    [value]="selectedValue"
    [disabled]="disabled"
    class="form-control"
    [class.error]="errorMessage"
    [attr.aria-labelledby]="label ? (id + '-label') : null"
    [attr.aria-label]="label ? null : placeholder"
    [attr.title]="label ? label : placeholder"
    (change)="onSelectChange($event)"
    (blur)="onBlur()"
  >
    <option value="" disabled [selected]="selectedValue === ''">{{ placeholder }}</option>
    <option *ngFor="let option of options" [value]="option.id">
      {{ option.label }}
    </option>
  </select>
  <small *ngIf="errorMessage" class="error-message">{{ errorMessage }}</small>
</div>
