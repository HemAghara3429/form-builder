<div class="form-setup-container">
  <!-- Header -->
  <div class="form-setup-header">
    <h1 class="page-title">FORM BUILDER</h1>
    <div class="header-actions">
      <button type="button" class="btn btn-default">
        <!-- icon component use you just name required -->
        <app-icon name="share-2" size="small"></app-icon>
        <span>Share</span>
      </button>
      <button type="button" class="btn btn-primary">
        <app-icon name="list" size="small"></app-icon>
        <span>Form Builder List</span>
      </button>
    </div>
  </div>

  <div class="main-div">
    <!-- Tabs Navigation -->
    <div class="tabs-navigation">
      <div class="tab-wrapper" role="tablist" aria-label="Form builder steps">
        <div class="tab-item active" role="tab" aria-selected="true" tabindex="0">
          <!-- icon component use you just name required -->
          <app-icon name="file-text" size="medium"></app-icon>
          <span class="tab-text">Form Setup</span>
        </div>
        <div class="tab-item disabled" role="tab" aria-selected="false" aria-disabled="true" tabindex="-1">
          <app-icon name="hammer" size="medium"></app-icon>
          <span class="tab-text">Form Builder</span>
        </div>
        <div class="tab-item disabled" role="tab" aria-selected="false" aria-disabled="true" tabindex="-1">
          <app-icon name="link" size="medium"></app-icon>
          <span class="tab-text">Integration Code</span>
        </div>
      </div>
<!-- cancel button here oncancel method call when click on the cancel button -->
      <div class="action-buttons">
        <button type="button" class="btn-cancel" (click)="onCancel()">
          <app-icon name="x" size="small"></app-icon>
          <span>Cancel</span>
        </button>
        <button type="submit" class="btn-save" form="formSetupForm" [disabled]="isSubmitting">
          <app-icon name="bookmark" size="small"></app-icon>
          <span>Save &amp; Next</span>
        </button>
      </div>
    </div>

    <!-- Main Content -->
    <div class="form-setup-content">
      <!-- Success Message -->
      <div *ngIf="successMessage" class="notice notice-success" role="status" aria-live="polite">
        <div class="notice-icon" aria-hidden="true">
          <app-icon name="check" size="medium"></app-icon>
        </div>
        <div class="notice-body">
          <div class="notice-title">Saved</div>
          <!-- success message show when the form submit successfully -->
          <div class="notice-message">{{ successMessage }}</div>
        </div>
        <!-- when the user click on cross button disable the success message. -->
        <button type="button" class="notice-close" (click)="dismissSuccess()" aria-label="Dismiss success message">
          <app-icon name="x" size="small"></app-icon>
        </button>
      </div>

      <!-- Error Message -->
       <!-- error message when the form is not submit properly -->
      <div *ngIf="errorMessage" class="alert alert-error">
        <app-icon name="x" size="small"></app-icon>
        <span>{{ errorMessage }}</span>
      </div>

      <!-- Form -->
       <!-- when click on the submit button here onsubmit method call -->
      <form id="formSetupForm" [formGroup]="formSetupForm" (ngSubmit)="onSubmit()" class="form-setup-form">
        <!-- Row 1: Form Name | Branch -->
        <div class="form-row">
          <div class="form-col">
            <!-- app input here get method:here pass the data from parent component to child component -->
            <app-input [value]="formSetupForm.get('formName')?.value"
              (valueChange)="formSetupForm.patchValue({formName: $event})" label="Form Name" iconName="file-text"
              placeholder="Enter your form name" [required]="true" [errorMessage]="
              isFieldInvalid('formName') ? 'Form name is required (min 3 chars)' : ''
            "></app-input>
          </div>
          <div class="form-col">
            <app-select [selectedValue]="formSetupForm.get('branch')?.value"
              (selectionChange)="formSetupForm.patchValue({branch: $event})" label="Branch" iconName="building"
              placeholder="Select Branch" [options]="branches" [required]="true" [errorMessage]="
              isFieldInvalid('branch') ? 'Branch is required' : ''
            "></app-select>
          </div>
        </div>

        <!-- Row 2: Logo URL | Section -->
        <div class="form-row">
          <div class="form-col">
            <app-input [value]="formSetupForm.get('logoUrl')?.value"
              (valueChange)="formSetupForm.patchValue({logoUrl: $event})" label="Logo URL" iconName="image"
              placeholder="Optional"></app-input>
          </div>
          <div class="form-col">
            <app-select [selectedValue]="formSetupForm.get('section')?.value"
              (selectionChange)="formSetupForm.patchValue({section: $event})" label="Section" iconName="layers"
              placeholder="Select Section" [options]="sections" [required]="true" [errorMessage]="
              isFieldInvalid('section') ? 'Section is required' : ''
            "></app-select>
          </div>
        </div>

        <!-- Row 3: Responsible User | Form Status -->
        <div class="form-row">
          <div class="form-col">
            <!-- select component add here for the responsible user -->
            <app-select [selectedValue]="formSetupForm.get('responsibleUser')?.value"
              (selectionChange)="formSetupForm.patchValue({responsibleUser: $event})" label="Responsible User"
              iconName="user" placeholder="Select User" [options]="responsibleUsers" [required]="true" [errorMessage]="
              isFieldInvalid('responsibleUser')
                ? 'Responsible user is required'
                : ''
            "></app-select>
          </div>
          <div class="form-col form-col-status">
            <div class="form-group">
              <label class="form-label">
                <app-icon name="refresh-cw" size="small"></app-icon>
                Form Status <span class="required">*</span>
              </label>
              <div class="status-toggle">
                <label class="status-option"
                  [class.selected]="formSetupForm.get('formStatus')?.value === formStatuses[0].id">
                  <input type="radio" [checked]="formSetupForm.get('formStatus')?.value === formStatuses[0].id"
                    (change)="formSetupForm.patchValue({formStatus: formStatuses[0].id})" />
                  <span class="status-indicator"></span>
                  <span class="status-text">Unpublished</span>
                </label>
                <label class="status-option"
                  [class.selected]="formSetupForm.get('formStatus')?.value === formStatuses[1].id">
                  <input type="radio" [checked]="formSetupForm.get('formStatus')?.value === formStatuses[1].id"
                    (change)="formSetupForm.patchValue({formStatus: formStatuses[1].id})" />
                  <span class="status-indicator"></span>
                  <span class="status-text">Published</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Row 4: Submitted Button Name | Default Academic Year -->
        <div class="form-row">
          <div class="form-col">
            <app-select [selectedValue]="formSetupForm.get('submittedButtonName')?.value"
              (selectionChange)="formSetupForm.patchValue({submittedButtonName: $event})" label="Submitted Button Name"
              iconName="bookmark" placeholder="Select Button" [options]="submittedButtonOptions" [required]="true"
              [errorMessage]="
              isFieldInvalid('submittedButtonName')
                ? 'Button name is required'
                : ''
            "></app-select>
          </div>
          <div class="form-col">
            <app-select [selectedValue]="formSetupForm.get('defaultAcademicYear')?.value"
              (selectionChange)="formSetupForm.patchValue({defaultAcademicYear: $event})" label="Default Academic Year"
              iconName="clock" placeholder="Select Academic Year" [options]="academicYears" [required]="true"
              [errorMessage]="
              isFieldInvalid('defaultAcademicYear')
                ? 'Academic year is required'
                : ''
            "></app-select>
          </div>
        </div>

        <!-- Row 5: Description | Success Message -->
        <div class="form-row">
          <div class="form-col">
            <div class="field-width-80">
              <!-- valuechange here take the data from the child component to parent componentss -->
              <app-textarea [value]="formSetupForm.get('description')?.value"
                (valueChange)="formSetupForm.patchValue({description: $event})" label="Description" iconName="file-text"
                placeholder="Enter Description" [rows]="4"></app-textarea>
            </div>
          </div>
          <div class="form-col">
            <div class="field-width-80">
              <app-textarea [value]="formSetupForm.get('successMessage')?.value"
                (valueChange)="formSetupForm.patchValue({successMessage: $event})"
                label="Message To Show After Form is Successfully Submitted." iconName="message-circle"
                placeholder="Your Inquiry Has Been Submitted Successfully!" [rows]="4" [required]="true" [errorMessage]="
                isFieldInvalid('successMessage') ? 'Success message is required' : ''
              "></app-textarea>
            </div>
          </div>
        </div>

        <!-- Row 6: Confirmation Message (full width) -->
        <div class="form-row">
          <div class="form-col">
            <div class="field-width-80">
              <app-textarea [value]="formSetupForm.get('confirmationMessage')?.value"
                (valueChange)="formSetupForm.patchValue({confirmationMessage: $event})"
                label="Message To Show Before Inquiry Submit Confirmation." iconName="message-circle"
                placeholder="Are you sure you want to submit your inquiry? Please review your details before proceeding."
                [rows]="4" [required]="true" [errorMessage]="
                isFieldInvalid('confirmationMessage')
                  ? 'Confirmation message is required'
                  : ''
              "></app-textarea>
            </div>
          </div>
          <div class="form-col"></div>
        </div>
      </form>
    </div>
  </div>
</div>
