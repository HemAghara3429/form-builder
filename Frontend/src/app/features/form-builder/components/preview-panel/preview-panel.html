<div class="preview-panel">
  <div class="preview-panel-shell">
    <div class="preview-panel-header">
      <div class="preview-label">Form Preview</div>
      <h2 class="preview-title">{{ formName$ | async }}</h2>
      <p class="preview-description">
        Fill Form
      </p>

    </div>

    <div class="preview-fields" *ngIf="fields.length > 0; else emptyPreview">
      <div class="preview-field" [class.field-has-error]="errors[field.id]"
        *ngFor="let field of fields; trackBy: trackByFieldId">
        <div class="field-meta">
          <label class="field-label">
            {{ field.label || 'Untitled field' }}
            <span *ngIf="field.required" class="field-required">*</span>
          </label>
          <p class="field-description" *ngIf="field.description">{{ field.description }}</p>
        </div>

        <ng-container [ngSwitch]="field.type">
          <!-- single line show in preview form -->
          <input *ngSwitchCase="FieldType.SINGLE_LINE" class="field-input" type="text" placeholder="Your answer"
            title="{{ field.label || 'Short answer' }}" [attr.aria-label]="field.label || 'Short answer'"
            [(ngModel)]="formValues[field.id]" (ngModelChange)="onValueChange(field, $event)"
            [required]="field.required" />
          <!-- paragraph show in preview form -->
          <textarea *ngSwitchCase="FieldType.PARAGRAPH" class="field-input field-textarea" placeholder="Your answer"
            title="{{ field.label || 'Long answer' }}" [attr.aria-label]="field.label || 'Long answer'" rows="4"
            [(ngModel)]="formValues[field.id]" (ngModelChange)="onValueChange(field, $event)"
            [required]="field.required"></textarea>
          <!-- drop down show in preview form -->
          <div *ngSwitchCase="FieldType.DROPDOWN" class="field-select-wrapper">
            <select class="field-input" title="{{ field.label || 'Select an option' }}"
              [attr.aria-label]="field.label || 'Select an option'" [(ngModel)]="formValues[field.id]"
              (ngModelChange)="onValueChange(field, $event)" [required]="field.required">
              <option value="">{{ field.placeholder || 'Select an option' }}</option>
              <option *ngFor="let option of field.options" [value]="option.label">{{ option.label }}</option>
            </select>
          </div>
          <!-- radio button show in preview form -->
          <div *ngSwitchCase="FieldType.RADIO" class="field-options">
            <label *ngFor="let option of field.options" class="field-option">
              <input type="radio" [name]="field.id" [value]="option.label" [(ngModel)]="formValues[field.id]"
                (change)="onValueChange(field, option.label)" [required]="field.required" />
              <span>{{ option.label }}</span>
            </label>
          </div>
          <!-- check box show in preview form -->
          <div *ngSwitchCase="FieldType.CHECKBOX" class="field-options">
            <label *ngFor="let option of field.options" class="field-option">
              <input type="checkbox" [checked]="isCheckboxChecked(field, option.id)"
                (change)="onCheckboxChange(field, option.id, $event.target.checked)" />
              <span>{{ option.label }}</span>
            </label>
          </div>
          <!-- date picker show in preview form -->
          <input *ngSwitchCase="FieldType.DATE_PICKER" class="field-input" type="date"
            title="{{ field.label || 'Date picker' }}" [attr.aria-label]="field.label || 'Date picker'"
            [(ngModel)]="formValues[field.id]" (ngModelChange)="onValueChange(field, $event)"
            [required]="field.required" />
          <!-- time picker show in preview form -->
          <input *ngSwitchCase="FieldType.TIME_PICKER" class="field-input" type="time"
            title="{{ field.label || 'Time picker' }}" [attr.aria-label]="field.label || 'Time picker'"
            [(ngModel)]="formValues[field.id]" (ngModelChange)="onValueChange(field, $event)"
            [required]="field.required" />
          <!-- upload file show in preview form -->
          <div *ngSwitchCase="FieldType.UPLOAD_FILE" class="field-upload">
            <input type="file" class="file-input" (change)="onFileSelected(field.id, $event)" />
            <div class="upload-simple">
              <span>Upload file</span>
              <span class="upload-hint">PDF, JPG, PNG, DOCX</span>
            </div>
            <div class="file-name" *ngIf="formValues[field.id]">
              {{ getUploadedFileName(formValues[field.id]) }}
            </div>
          </div>
          <!-- rating star show in preview form -->
          <div *ngSwitchCase="FieldType.RATING_STAR" class="field-rating">
            <label *ngFor="let star of getRatingArray(field.maxRating ?? 5)" class="rating-star">
              <input type="radio" [name]="field.id" [value]="star" [(ngModel)]="formValues[field.id]"
                (change)="onValueChange(field, star)" />
              ★
            </label>
          </div>
          <!-- rating number show in preview form -->
          <div *ngSwitchCase="FieldType.RATING_NUMBER" class="field-rating">
            <label *ngFor="let num of getRatingArray(field.maxRating ?? 10)" class="rating-number">
              <input type="radio" [name]="field.id" [value]="num" [(ngModel)]="formValues[field.id]"
                (change)="onValueChange(field, num)" />
              {{ num }}
            </label>
          </div>
          <!-- image show in preview form -->
          <div *ngSwitchCase="FieldType.IMAGE" class="field-image">
            <img *ngIf="field.imageUrl" [src]="field.imageUrl" alt="Preview image" />
            <div *ngIf="!field.imageUrl" class="image-placeholder">
              Image preview
            </div>
          </div>
          <!-- term and condition show in preview form -->
          <label *ngSwitchCase="FieldType.TERMS_CONDITION" class="field-option terms-option">
            <input type="checkbox" [(ngModel)]="formValues[field.id]" (ngModelChange)="onValueChange(field, $event)"
              [required]="field.required" />
            <span>{{ field.termsText || 'I agree to the terms and conditions.' }}</span>
          </label>
        </ng-container>
        <div class="error-message" *ngIf="errors[field.id]">
          {{ errors[field.id] }}
        </div>
      </div>
    </div>
    <!-- nothing filed in preview form the show this text in preview form -->
    <ng-template #emptyPreview>
      <div class="preview-empty">
        <p>No filed added in Form Builder</p>
      </div>
    </ng-template>

    <!-- show the success and error message -->
    <div class="preview-footer" *ngIf="fields.length > 0">
      <button class="submit-btn" type="button" (click)="submitForm()">Submit</button>
      <p class="submit-success" *ngIf="successMessage">{{ successMessage }}</p>
      <p class="submit-error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </div>
  </div>
</div>
