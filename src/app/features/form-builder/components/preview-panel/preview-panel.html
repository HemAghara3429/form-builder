<div class="preview-panel">
  <div class="preview-header">
    <div class="preview-label">Form Preview</div>
    <h2>{{ (formName$ | async) || 'Untitled Form' }}</h2>
    <p>Preview renders the current dynamic fields from the builder.</p>
  </div>

  <div class="preview-empty" *ngIf="fields.length === 0">
    <p>No fields added yet. Drag fields to the canvas to preview them live.</p>
  </div>

  <div class="preview-fields" *ngIf="fields.length > 0">
    <div class="preview-field" *ngFor="let field of fields; trackBy: trackByFieldId">
      <div class="field-label-row">
        <label class="field-label" *ngIf="field.label">
          {{ field.label }}<span *ngIf="field.required"> *</span>
        </label>
        <span class="field-type">{{ fieldTypeLabel(field.type) }}</span>
      </div>

      <p class="field-description" *ngIf="field.description">{{ field.description }}</p>

      <ng-container [ngSwitch]="field.type">
        <input
          *ngSwitchCase="FieldType.SINGLE_LINE"
          type="text"
          class="field-control"
          placeholder="{{ field.placeholder || 'Short answer text' }}"
          title="{{ field.label || 'Short answer text' }}"
          [attr.aria-label]="field.label || 'Short answer text'"
          disabled
        />
        <textarea
          *ngSwitchCase="FieldType.PARAGRAPH"
          class="field-control"
          placeholder="{{ field.placeholder || 'Long answer text' }}"
          title="{{ field.label || 'Long answer text' }}"
          [attr.aria-label]="field.label || 'Long answer text'"
          disabled
          rows="4"
        ></textarea>
        <div *ngSwitchCase="FieldType.DROPDOWN" class="field-control dropdown-control">
          <select
            disabled
            title="{{ field.label || (field.placeholder || 'Select an option') }}"
            [attr.aria-label]="field.label || (field.placeholder || 'Select an option')"
          >
            <option>{{ field.placeholder || 'Select an option' }}</option>
            <option *ngFor="let option of field.options">{{ option.label }}</option>
          </select>
        </div>
        <div *ngSwitchCase="FieldType.RADIO" class="field-options">
          <label *ngFor="let option of field.options" class="field-option">
            <input type="radio" [name]="field.id" disabled />
            <span>{{ option.label }}</span>
          </label>
        </div>
        <div *ngSwitchCase="FieldType.CHECKBOX" class="field-options">
          <label *ngFor="let option of field.options" class="field-option">
            <input type="checkbox" disabled />
            <span>{{ option.label }}</span>
          </label>
        </div>
        <input
          *ngSwitchCase="FieldType.DATE_PICKER"
          type="date"
          class="field-control"
          title="{{ field.label || 'Date picker' }}"
          [attr.aria-label]="field.label || 'Date picker'"
          disabled
        />
        <input
          *ngSwitchCase="FieldType.TIME_PICKER"
          type="time"
          class="field-control"
          title="{{ field.label || 'Time picker' }}"
          [attr.aria-label]="field.label || 'Time picker'"
          disabled
        />
        <div *ngSwitchCase="FieldType.UPLOAD_FILE" class="field-upload">
          <span>Upload file</span>
        </div>
        <div *ngSwitchCase="FieldType.RATING_STAR" class="field-rating">
          <span *ngFor="let star of getRatingArray(field.maxRating ?? 5)" class="rating-star">★</span>
        </div>
        <div *ngSwitchCase="FieldType.RATING_NUMBER" class="field-rating">
          <span *ngFor="let num of getRatingArray(field.maxRating ?? 10)" class="rating-number">{{ num }}</span>
        </div>
        <div *ngSwitchCase="FieldType.IMAGE" class="field-image">
          <img *ngIf="field.imageUrl" [src]="field.imageUrl" alt="Preview image" />
          <div *ngIf="!field.imageUrl" class="image-placeholder">Image preview</div>
        </div>
        <label *ngSwitchCase="FieldType.TERMS_CONDITION" class="field-option">
          <input type="checkbox" disabled />
          <span>{{ field.termsText || 'I agree to the terms and conditions.' }}</span>
        </label>
      </ng-container>
    </div>
  </div>
</div>
